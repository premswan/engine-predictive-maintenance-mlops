name: Predictive Maintenance MLOps Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  mlops-pipeline:
    runs-on: ubuntu-latest
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Register dataset on Hugging Face
        run: python scripts/register_dataset.py

      - name: Prepare clean train and test data
        run: python scripts/prepare_data.py

      - name: Train, evaluate, and register best model
        run: python scripts/train_and_register_model.py

      - name: Create deployment files
        run: python scripts/create_deployment_files.py

      - name: Push deployment files to Hugging Face Space
        run: python scripts/push_to_hf_space.py

      - name: Commit generated artifacts back to main
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data model_artifacts deployment scripts requirements-ci.txt README.md pipeline.yml .github/workflows/pipeline.yml || true
          if git diff --cached --quiet; then
            echo "No generated artifact changes to commit."
          else
            git commit -m "chore: update MLOps generated artifacts [skip ci]"
            git push origin main
          fi
